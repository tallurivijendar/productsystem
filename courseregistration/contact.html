<!DOCTYPE html>
<html lang="en">
<head>

<div class="mb-3">

</div>

Send
</button>

</form>

</div>

<div class="col-md-6">

</div>

<p>
ABC Training Institute<br>
Hyderabad, Telangana
</p>

<p>
Phone: 9876543210
</p>

<p>
Email: abc@gmail.com
</p>

</div>

</div>

</div>

</body>
</html>
