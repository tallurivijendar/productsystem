<!DOCTYPE html>
<html>
<head>
    <title>Survey</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Society Survey</h1>
</header>

<form>
    <label>Cleanliness Satisfaction:</label>
    <select>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select><br><br>

    <label>Security Service Feedback:</label><br>
    <input type="radio" name="security"> Good
    <input type="radio" name="security"> Average
    <input type="radio" name="security"> Poor
    <br><br>

    <label>Parking Issues:</label><br>
    <input type="checkbox"> Limited Space
    <input type="checkbox"> Unauthorized Parking
    <br><br>

    <label>Suggestions:</label><br>
    <textarea rows="5" cols="40"></textarea><br><br>

    <button type="submit">Submit Survey</button>
</form>
</body>
</html>
