<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Example</title>
    <style>
        .container {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items:center;
            
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: lightblue;
            border: 2px solid black;
            text-align: center;
            line-height: 100px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>

</body>
</html>
