<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

<h2 class="text-center mb-4">
Contact Us
</h2>

<div class="alert alert-success">
Message Sent Successfully!
</div>

<form>

<div class="mb-3">
<label>Name</label>
<input type="text"
class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email"
class="form-control">
</div>

<div class="mb-3">
<label>Subject</label>
<input type="text"
class="form-control">
</div>

<div class="mb-3">
<label>Message</label>

<textarea
class="form-control"
rows="5">
</textarea>
</div>

<button class="btn btn-primary">
Send Message
</button>

</form>

</div>

</body>
</html>
