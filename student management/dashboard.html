<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-5">

<h2 class="text-center mb-4">Student Dashboard</h2>

<div class="row g-3">

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>Total Students</h5>
<h3>500</h3>
<span class="badge bg-primary">Active</span>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>Present</h5>
<h3>450</h3>
<span class="badge bg-success">Today</span>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>Absent</h5>
<h3>50</h3>
<span class="badge bg-danger">Today</span>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card text-center">
<div class="card-body">
<h5>Placements</h5>
<h3>120</h3>
<span class="badge bg-warning">Placed</span>
</div>
</div>
</div>

</div>

<div class="my-4">
<input type="text"
class="form-control"
placeholder="Search Student">
</div>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">
<tr>
<th>Roll No</th>
<th>Name</th>
<th>Branch</th>
<th>Attendance</th>
</tr>
</thead>

<tbody>

<tr>
<td>101</td>
<td>Rahul</td>
<td>CSE</td>
<td>90%</td>
</tr>

<tr>
<td>102</td>
<td>Priya</td>
<td>ECE</td>
<td>88%</td>
</tr>

<tr>
<td>103</td>
<td>Arjun</td>
<td>IT</td>
<td>95%</td>
</tr>

</tbody>
</table>
</div>

<button class="btn btn-info"
data-bs-toggle="collapse"
data-bs-target="#placement">
Placement Details
</button>

<div class="collapse mt-3" id="placement">

<div class="card card-body">
Placed Students : 120 <br>
Companies : TCS, Infosys, Wipro
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
